version: 2.1

jobs:
  build_and_test:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install dependencies (no cache)
          command: npm ci
      - run:
          name: Run tests
          command: npm run test:ci

workflows:
  baseline_pipeline:
    jobs:
      - build_and_test

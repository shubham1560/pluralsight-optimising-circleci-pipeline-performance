version: 2.1

jobs:
  build_assets:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project/m1
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - v2-npm-cache-{{ checksum "package-lock.json" }}
            - v2-npm-cache-
      - run:
          name: Install dependencies
          command: npm ci --prefer-offline
      - save_cache:
          key: v2-npm-cache-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Build distributable output
          command: |
            mkdir -p dist logs
            cp src/math.js dist/math.js
            echo "Build completed at $(date)" > logs/build.log
      - persist_to_workspace:
          root: ~/project/m1
          paths:
            - dist
      - store_artifacts:
          path: logs
          destination: build-logs

  test_with_workspace:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project/m1
    steps:
      - checkout:
          path: ~/project
      - attach_workspace:
          at: ~/project/m1
      - restore_cache:
          keys:
            - v2-npm-cache-{{ checksum "package-lock.json" }}
            - v2-npm-cache-
      - run:
          name: Install dependencies
          command: npm ci --prefer-offline
      - save_cache:
          key: v2-npm-cache-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Validate workspace handoff
          command: |
            test -f dist/math.js
            echo "Workspace attach succeeded: dist/math.js is available."
      - run:
          name: Run tests (JUnit + coverage) and write debug logs
          command: |
            mkdir -p test-results logs
            npm run test:ci
            {
              echo "=== CI debug context ==="
              echo "Timestamp: $(date -u)"
              echo "Node: $(node -v)"
              echo "npm: $(npm -v)"
              echo "CIRCLE_JOB=${CIRCLE_JOB:-}"
              echo "CIRCLE_BRANCH=${CIRCLE_BRANCH:-}"
              echo "DEMO_FAIL_TESTS=${DEMO_FAIL_TESTS:-}"
              echo "--- dist (from workspace) ---"
              ls -la dist || true
              echo "--- test-results ---"
              ls -la test-results || true
            } | tee logs/ci-context.txt
            echo "See test-results/junit.xml (JUnit), coverage/ (lcov + HTML), logs/ci-context.txt." >> logs/test-summary.txt
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: junit-xml
      - store_artifacts:
          path: coverage
          destination: coverage-report
      - store_artifacts:
          path: logs
          destination: test-debug-logs

  verify_dist_consumer:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project/m1
    steps:
      - checkout:
          path: ~/project
      - attach_workspace:
          at: ~/project/m1
      - run:
          name: Consume workspace only (no dependency install)
          command: |
            set -euo pipefail
            mkdir -p logs
            test -f dist/math.js
            echo "Consumer job sees build output from workspace."
            wc -c dist/math.js | tee logs/verify-consumer.txt
            echo "Verified at $(date -u +%Y-%m-%dT%H:%MZ)" >> logs/verify-consumer.txt
      - store_artifacts:
          path: logs/verify-consumer.txt
          destination: workspace-consumer-verify

workflows:
  module2_demo_workspace_vs_artifacts:
    jobs:
      - build_assets
      - test_with_workspace:
          requires:
            - build_assets
      - verify_dist_consumer:
          requires:
            - build_assets

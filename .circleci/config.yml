version: 2.1

jobs:
  build_and_test:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project/m1
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - v2-npm-cache-{{ checksum "package-lock.json" }}
            - v2-npm-cache-
      - run:
          name: Install dependencies (with cache)
          command: npm ci --prefer-offline
      - save_cache:
          key: v2-npm-cache-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run tests
          command: npm run test:ci

workflows:
  cached_pipeline:
    jobs:
      - build_and_test
